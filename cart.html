<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Trolley - Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo-area">
                <h1>Smart Trolley</h1>
            </div>
            <nav>
                <a href="category.html" class="nav-btn">Catalog</a>
            </nav>
        </header>

        <main>
            <section class="cart-section">
                <h2>Your Cart</h2>
                
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Item</th>
                                <th>Price (₹)</th>
                            </tr>
                        </thead>
                        <tbody id="cart-items">
                            <tr>
                                <td colspan="2" class="empty-msg">Waiting for scans...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="billing-summary">
                    <div class="summary-line">
                        <span>GST (18%):</span>
                        <span id="gst-amount">₹0.00</span>
                    </div>
                    <div class="summary-line total">
                        <span><strong>Total:</strong></span>
                        <span id="total-price"><strong>₹0.00</strong></span>
                    </div>
                </div>

                <button class="checkout-btn">Checkout</button>
            </section>
        </main>
    </div>

    <script src="script.js"></script>

    <div id="paymentModal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:white; padding:30px; border-radius:15px; box-shadow:0 0 20px rgba(0,0,0,0.5); text-align:center; z-index:1000;">
    <h3>Scan to Pay</h3>
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=yourname@upi&pn=SmartTrolley&am=170&cu=INR" alt="UPI QR">
    <p>Total: ₹<span id="modalTotal">0.00</span></p>
    <button onclick="closeModal()" class="nav-btn">I have Paid</button>
</div>

<script>
function showUPI() {
    // We target 'total-price' to match your script.js ID
    const totalElement = document.getElementById('total-price');
    const totalText = totalElement.innerText; 
    
    document.getElementById('modalTotal').innerText = totalText;
    document.getElementById('paymentModal').style.display = 'block';
}
function closeModal() {
    document.getElementById('paymentModal').style.display = 'none';
    // Clear the UI after they acknowledge payment
    location.reload(); 
}
</script>
</body>
</html>
